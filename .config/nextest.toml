[profile.default]
fail-fast = false
slow-timeout = { period = "15s", terminate-after = 2 }

# metallib compilation invokes the full xcrun metal + metallib toolchain on top of
# Slang + SPIRV-Tools opt/validate + SPIRV-Cross, which easily exceeds 30 s on CI.
[[profile.default.overrides]]
filter = "test(add_metallib)"
slow-timeout = { period = "60s", terminate-after = 2 }
